<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lazer Replay Compare Debug</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main id="panel" class="panel">
    <div class="title">LRC Debug</div>
    <div id="status" class="status">waiting...</div>
    <div class="grid">
      <span>mode</span><strong id="mode">-</strong>
      <span>hits sent</span><strong id="sent">0</strong>
      <span>mismatch</span><strong id="mismatch">0</strong>
      <span>last</span><strong id="last">-</strong>
    </div>
  </main>
  <script type="module" src="./index.js"></script>
</body>
</html>
